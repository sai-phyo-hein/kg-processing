# Metadata field configuration for the extraction pipeline.
#
# fields:     All fields the LLM/regex extractor will attempt to fill.
# mandatory:  Fields that MUST be present in the final metadata.
#             The pipeline raises an error if any of these are missing.
#             These are also used to build unique_id (joined with "_").

fields:
  - location_village
  - location_moo

mandatory:
  - location_moo
  - location_village
